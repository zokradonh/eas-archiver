name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: EasArchiver-win-x64
            ext: .exe
          - os: macos-latest
            rid: osx-arm64
            artifact: EasArchiver-osx-arm64
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Publish
        run: dotnet publish EasArchiver.Cli -c Release -r ${{ matrix.rid }} -o publish

      - name: Zip artifact
        shell: bash
        run: |
          cd publish
          if [ "${{ matrix.ext }}" = ".exe" ]; then
            7z a -tzip ../${{ matrix.artifact }}.zip EasArchiver.exe appsettings.json
          else
            chmod +x EasArchiver
            zip ../${{ matrix.artifact }}.zip EasArchiver appsettings.json
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/**/*.zip
